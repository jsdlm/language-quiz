<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz des Écritures</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2e3248;
      --text: #e8eaf6;
      --muted: #8b90a8;
      --accent: #7c83f5;
      --correct: #4caf7d;
      --wrong: #e05c5c;
      --btn-hover: #2a2d3e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sample {
      text-align: center;
      line-height: 1.5;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      border-radius: 10px;
      background: #13161f;
      border: 1px solid var(--border);
      word-break: break-word;
      transition: font-size 0.15s;
    }

    .sample.loading { color: var(--muted); font-size: 1.6rem; letter-spacing: 0.3em; }
    .sample.error   { color: var(--wrong); font-size: 0.9rem; }

    .question {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .choice {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 0.8rem 1rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, border-color 0.12s;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .choice:hover:not(:disabled) {
      background: var(--btn-hover);
      border-color: var(--accent);
    }

    .choice:disabled { cursor: default; }

    .choice-name      { font-size: 0.95rem; font-weight: 600; }
    .choice-countries { font-size: 0.72rem; color: var(--muted); line-height: 1.3; }

    .choice.correct .choice-countries,
    .choice.reveal  .choice-countries,
    .choice.wrong   .choice-countries { color: inherit; opacity: 0.75; }

    .choice.correct { background: rgba(76,175,125,0.15); border-color: var(--correct); color: var(--correct); }
    .choice.wrong   { background: rgba(224,92,92,0.12);  border-color: var(--wrong);   color: var(--wrong);   }
    .choice.reveal  { background: rgba(76,175,125,0.08); border-color: var(--correct); color: var(--correct); }

    .feedback { text-align: center; font-size: 0.95rem; min-height: 1.4rem; color: var(--muted); }
    .feedback.ok { color: var(--correct); font-weight: 600; }
    .feedback.ko { color: var(--wrong);   font-weight: 600; }

    #next-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.12s;
    }

    #next-btn:hover    { opacity: 0.85; }
    #next-btn:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>
  <h1>Reconnais l'écriture</h1>
  <div class="card">
    <div class="sample loading" id="sample">···</div>
    <div class="question">Dans quelle langue est ce texte ?</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button id="next-btn" disabled>Suivant →</button>
  </div>

  <script>
    const LANGUAGES = [
      // — Romanes —
      { name: "Espagnol",   countries: ["Espagne","Mexique","Argentine"],        wiki: "es" },
      { name: "Portugais",  countries: ["Portugal","Brésil","Açores"],           wiki: "pt" },
      { name: "Italien",    countries: ["Italie","Saint-Marin","Suisse"],        wiki: "it" },

      // — Germaniques —
      { name: "Allemand",   countries: ["Allemagne","Autriche","Suisse"],        wiki: "de" },
      { name: "Néerlandais",countries: ["Pays-Bas","Curaçao"],                   wiki: "nl" },

      // — Nordiques —
      { name: "Norvégien",  countries: ["Norvège"],                              wiki: "no" },
      { name: "Suédois",    countries: ["Suède","Åland"],                        wiki: "sv" },
      { name: "Danois",     countries: ["Danemark","Groenland"],                 wiki: "da" },
      { name: "Finnois",    countries: ["Finlande"],                             wiki: "fi" },
      { name: "Islandais",  countries: ["Islande"],                              wiki: "is" },

      // — Baltes —
      { name: "Letton",     countries: ["Lettonie"],                             wiki: "lv" },
      { name: "Lituanien",  countries: ["Lituanie"],                             wiki: "lt" },
      { name: "Estonien",   countries: ["Estonie"],                              wiki: "et" },

      // — Slaves cyrilliques —
      { name: "Russe",      countries: ["Russie"],                               wiki: "ru" },
      { name: "Ukrainien",  countries: ["Ukraine"],                              wiki: "uk" },
      { name: "Bulgare",    countries: ["Bulgarie"],                             wiki: "bg" },
      { name: "Serbe",      countries: ["Serbie","Bosnie-Herzégovine"],          wiki: "sr" },
      { name: "Macédonien", countries: ["Macédoine du Nord"],                    wiki: "mk" },

      // — Slaves latins —
      { name: "Polonais",   countries: ["Pologne"],                              wiki: "pl" },
      { name: "Tchèque",    countries: ["République tchèque"],                   wiki: "cs" },
      { name: "Slovaque",   countries: ["Slovaquie"],                            wiki: "sk" },
      { name: "Croate",     countries: ["Croatie"],                              wiki: "hr" },
      { name: "Slovène",    countries: ["Slovénie"],                             wiki: "sl" },
      { name: "Roumain",    countries: ["Roumanie","Moldavie"],                  wiki: "ro" },

      // — Autres européens —
      { name: "Hongrois",   countries: ["Hongrie","Roumanie","Slovaquie"],       wiki: "hu" },
      { name: "Grec",       countries: ["Grèce","Chypre"],                       wiki: "el" },
      { name: "Albanais",   countries: ["Albanie"],                              wiki: "sq" },
      { name: "Maltais",    countries: ["Malte"],                                wiki: "mt" },
      { name: "Turc",       countries: ["Turquie"],                              wiki: "tr" },

      // — Abjads —
      { name: "Arabe",      countries: ["Égypte","Arabie Saoudite","Maroc"],     wiki: "ar" },
      { name: "Hébreu",     countries: ["Israël"],                               wiki: "he" },

      // — Asie de l'Est —
      { name: "Chinois",    countries: ["Chine","Taïwan","Singapour"],           wiki: "zh" },
      { name: "Japonais",   countries: ["Japon"],                                wiki: "ja" },
      { name: "Coréen",     countries: ["Corée du Sud"],                         wiki: "ko" },
      { name: "Mongol",     countries: ["Mongolie"],                             wiki: "mn" },

      // — Asie centrale —
      { name: "Kazakh",     countries: ["Kazakhstan"],                           wiki: "kk" },
      { name: "Kirghiz",    countries: ["Kirghizistan"],                         wiki: "ky" },

      // — Asie du Sud —
      { name: "Hindi",      countries: ["Inde"],                                 wiki: "hi" },
      { name: "Népalais",   countries: ["Népal"],                                wiki: "ne" },
      { name: "Bengali",    countries: ["Bangladesh"],                           wiki: "bn" },
      { name: "Dzongkha",   countries: ["Bhoutan"],                              wiki: "dz" },
      { name: "Singhalais", countries: ["Sri Lanka"],                            wiki: "si" },

      // — Asie du Sud-Est —
      { name: "Thaï",       countries: ["Thaïlande"],                            wiki: "th" },
      { name: "Vietnamien", countries: ["Vietnam"],                              wiki: "vi" },
      { name: "Laotien",    countries: ["Laos"],                                 wiki: "lo" },
      { name: "Khmer",      countries: ["Cambodge"],                             wiki: "km" },
      { name: "Indonésien", countries: ["Indonésie"],                            wiki: "id" },
      { name: "Malais",     countries: ["Malaisie"],                             wiki: "ms" },
      { name: "Filipino",   countries: ["Philippines"],                          wiki: "tl" },
    ];

    const sampleEl   = document.getElementById('sample');
    const choicesEl  = document.getElementById('choices');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn    = document.getElementById('next-btn');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pick(arr, n) { return shuffle(arr).slice(0, n); }
    function randomLang() { return LANGUAGES[Math.floor(Math.random() * LANGUAGES.length)]; }

    function adjustFontSize(text) {
      const len = text.length;
      sampleEl.style.fontSize =
        len < 25  ? '2.4rem' :
        len < 60  ? '1.9rem' :
        len < 120 ? '1.4rem' : '1.1rem';
    }

    async function fetchWikiText(lang) {
      const base = `https://${lang.wiki}.wikipedia.org/w/api.php`;
      const r1 = await fetch(
        `${base}?action=query&list=random&rnlimit=1&rnnamespace=0&format=json&origin=*`,
        { signal: AbortSignal.timeout(5000) }
      );
      const d1 = await r1.json();
      const pageId = d1.query.random[0].id;

      const r2 = await fetch(
        `${base}?action=query&prop=extracts&exsentences=2&exintro=true&explaintext=true&pageids=${pageId}&format=json&origin=*`,
        { signal: AbortSignal.timeout(5000) }
      );
      const d2 = await r2.json();
      const extract = Object.values(d2.query.pages)[0].extract?.trim() ?? '';

      if (extract.length < 15) throw new Error('extract too short');

      if (extract.length > 250) {
        const cut = extract.slice(0, 250);
        return cut.slice(0, cut.lastIndexOf(' ')) + '…';
      }
      return extract;
    }

    let prefetched = null;
    let prefetching = false;

    async function prefetchNext() {
      if (prefetching) return;
      prefetching = true;
      try {
        const lang = randomLang();
        const distractors = pick(LANGUAGES.filter(l => l.name !== lang.name), 3);
        const text = await fetchWikiText(lang);
        prefetched = { lang, distractors, text };
      } catch {
        prefetched = null;
      }
      prefetching = false;
    }

    function renderQuestion({ lang, distractors, text }) {
      feedbackEl.textContent = '';
      feedbackEl.className   = 'feedback';
      nextBtn.disabled       = true;
      choicesEl.innerHTML    = '';

      sampleEl.className   = 'sample';
      sampleEl.textContent = text;
      adjustFontSize(text);

      shuffle([lang, ...distractors]).forEach(l => {
        const btn = document.createElement('button');
        btn.className    = 'choice';
        btn.dataset.lang = l.name;

        const nameEl = document.createElement('span');
        nameEl.className   = 'choice-name';
        nameEl.textContent = l.name;

        const cEl = document.createElement('span');
        cEl.className   = 'choice-countries';
        cEl.textContent = l.countries.join(', ');

        btn.appendChild(nameEl);
        btn.appendChild(cEl);
        btn.addEventListener('click', () => answer(btn, l.name, lang.name));
        choicesEl.appendChild(btn);
      });
    }

    async function newQuestion() {
      nextBtn.disabled       = true;
      choicesEl.innerHTML    = '';
      feedbackEl.textContent = '';
      sampleEl.className     = 'sample loading';
      sampleEl.textContent   = '···';
      sampleEl.style.fontSize = '1.6rem';

      if (prefetching) {
        await new Promise(resolve => {
          const t = setInterval(() => { if (!prefetching) { clearInterval(t); resolve(); } }, 50);
        });
      }

      if (prefetched) {
        const q = prefetched;
        prefetched = null;
        renderQuestion(q);
        prefetchNext();
        return;
      }

      try {
        const lang = randomLang();
        const distractors = pick(LANGUAGES.filter(l => l.name !== lang.name), 3);
        const text = await fetchWikiText(lang);
        renderQuestion({ lang, distractors, text });
      } catch {
        sampleEl.className    = 'sample error';
        sampleEl.style.fontSize = '0.9rem';
        sampleEl.textContent  = 'Erreur de chargement — vérifie ta connexion';
        nextBtn.disabled = false;
      }

      prefetchNext();
    }

    function answer(clicked, chosen, correct) {
      choicesEl.querySelectorAll('.choice').forEach(b => b.disabled = true);

      if (chosen === correct) {
        clicked.classList.add('correct');
        feedbackEl.textContent = '✓ Correct !';
        feedbackEl.className   = 'feedback ok';
      } else {
        clicked.classList.add('wrong');
        feedbackEl.textContent = `✗ C'était du ${correct}`;
        feedbackEl.className   = 'feedback ko';
        choicesEl.querySelectorAll('.choice').forEach(b => {
          if (b.dataset.lang === correct) b.classList.add('reveal');
        });
      }

      nextBtn.disabled = false;
    }

    nextBtn.addEventListener('click', newQuestion);
    newQuestion();
  </script>
</body>
</html>

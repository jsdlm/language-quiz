<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz des Écritures</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2e3248;
      --text: #e8eaf6;
      --muted: #8b90a8;
      --accent: #7c83f5;
      --correct: #4caf7d;
      --wrong: #e05c5c;
      --btn-hover: #2a2d3e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sample {
      text-align: center;
      line-height: 1.5;
      min-height: 5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      border-radius: 10px;
      background: #13161f;
      border: 1px solid var(--border);
      word-break: break-word;
      transition: font-size 0.15s;
    }

    .sample.loading { color: var(--muted); font-size: 1.6rem; letter-spacing: 0.3em; }
    .sample.error   { color: var(--wrong); font-size: 0.9rem; }

    .question {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .choice {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      padding: 0.8rem 1rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.12s, border-color 0.12s;
      font-family: inherit;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .choice:hover:not(:disabled) {
      background: var(--btn-hover);
      border-color: var(--accent);
    }

    .choice:disabled { cursor: default; }

    .choice-name      { font-size: 0.95rem; font-weight: 600; }
    .choice-countries { font-size: 0.72rem; color: var(--muted); line-height: 1.3; }

    .choice.correct .choice-countries,
    .choice.reveal  .choice-countries,
    .choice.wrong   .choice-countries { color: inherit; opacity: 0.75; }

    .choice.correct { background: rgba(76,175,125,0.15); border-color: var(--correct); color: var(--correct); }
    .choice.wrong   { background: rgba(224,92,92,0.12);  border-color: var(--wrong);   color: var(--wrong);   }
    .choice.reveal  { background: rgba(76,175,125,0.08); border-color: var(--correct); color: var(--correct); }

    .feedback { text-align: center; font-size: 0.95rem; color: var(--muted); }
    .feedback.ok { color: var(--correct); font-weight: 600; }
    .feedback.ko { color: var(--wrong);   font-weight: 600; }

    #tip {
      font-size: 1rem;
      color: var(--muted);
      background: #13161f;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      line-height: 1.6;
      display: none;
    }

    #tip::before { content: '💡 '; }

    #next-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: opacity 0.12s;
    }

    #next-btn:hover    { opacity: 0.85; }
    #next-btn:disabled { opacity: 0.3; cursor: default; }

    /* Supprime le délai de 300ms au tap sur mobile */
    .choice, #next-btn { touch-action: manipulation; }

    @media (max-width: 600px) {
      body {
        height: 100dvh;
        overflow: hidden;
        padding: 0.75rem;
        padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
        justify-content: flex-start;
      }

      .card {
        flex: 1;
        min-height: 0;
        padding: 1.1rem 1rem;
        gap: 0.85rem;
      }

      /* Le texte grandit pour remplir l'espace libre */
      .sample { flex: 1; min-height: 0; }

      .choice { padding: 0.6rem 0.5rem; }
      .choice-name     { font-size: 0.88rem; }
      .choice-countries{ font-size: 0.67rem; }

      #tip { font-size: 0.92rem; padding: 0.7rem 0.85rem; }

      #next-btn { padding: 0.75rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="sample loading" id="sample">···</div>
    <div class="question">Dans quelle langue est ce texte ?</div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <div id="tip"></div>
    <button id="next-btn" disabled>Suivant →</button>
  </div>

  <script>
    let LANGUAGES = [];

    const sampleEl   = document.getElementById('sample');
    const choicesEl  = document.getElementById('choices');
    const feedbackEl = document.getElementById('feedback');
    const tipEl      = document.getElementById('tip');
    const nextBtn    = document.getElementById('next-btn');

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pick(arr, n) { return shuffle(arr).slice(0, n); }
    function randomLang() { return LANGUAGES[Math.floor(Math.random() * LANGUAGES.length)]; }

    // Distractors come from the same group first, then other groups to fill remaining slots.
    function pickDistractors(correct, n = 3) {
      const sameGroup = LANGUAGES.filter(l => l.name !== correct.name && l.group === correct.group);
      const otherGroup = LANGUAGES.filter(l => l.name !== correct.name && l.group !== correct.group);
      const fromSame = pick(sameGroup, Math.min(n, sameGroup.length));
      const fromOther = pick(otherGroup, n - fromSame.length);
      return [...fromSame, ...fromOther];
    }

    function adjustFontSize(text) {
      const len = text.length;
      sampleEl.style.fontSize =
        len < 25  ? '2.4rem' :
        len < 60  ? '1.9rem' :
        len < 120 ? '1.4rem' : '1.1rem';
    }

    async function fetchWikiText(lang) {
      const base = `https://${lang.wiki}.wikipedia.org/w/api.php`;
      const r1 = await fetch(
        `${base}?action=query&list=random&rnlimit=1&rnnamespace=0&format=json&origin=*`,
        { signal: AbortSignal.timeout(5000) }
      );
      const d1 = await r1.json();
      const pageId = d1.query.random[0].id;

      const r2 = await fetch(
        `${base}?action=query&prop=extracts&exsentences=2&exintro=true&explaintext=true&pageids=${pageId}&format=json&origin=*`,
        { signal: AbortSignal.timeout(5000) }
      );
      const d2 = await r2.json();
      const extract = Object.values(d2.query.pages)[0].extract?.trim() ?? '';

      if (extract.length < 15) throw new Error('extract too short');

      if (extract.length > 250) {
        const cut = extract.slice(0, 250);
        return cut.slice(0, cut.lastIndexOf(' ')) + '…';
      }
      return extract;
    }

    let prefetched = null;
    let prefetching = false;

    async function prefetchNext() {
      if (prefetching) return;
      prefetching = true;
      try {
        const lang = randomLang();
        const distractors = pickDistractors(lang);
        const text = await fetchWikiText(lang);
        prefetched = { lang, distractors, text };
      } catch {
        prefetched = null;
      }
      prefetching = false;
    }

    function renderQuestion({ lang, distractors, text }) {
      feedbackEl.textContent = '';
      feedbackEl.className   = 'feedback';
      tipEl.style.display    = 'none';
      tipEl.textContent      = '';
      nextBtn.disabled       = true;
      choicesEl.innerHTML    = '';

      sampleEl.className   = 'sample';
      sampleEl.textContent = text;
      adjustFontSize(text);

      shuffle([lang, ...distractors]).forEach(l => {
        const btn = document.createElement('button');
        btn.className    = 'choice';
        btn.dataset.lang = l.name;

        const nameEl = document.createElement('span');
        nameEl.className   = 'choice-name';
        nameEl.textContent = l.name;

        const cEl = document.createElement('span');
        cEl.className   = 'choice-countries';
        cEl.textContent = l.countries.join(', ');

        btn.appendChild(nameEl);
        btn.appendChild(cEl);
        btn.addEventListener('click', () => answer(btn, l.name, lang.name));
        choicesEl.appendChild(btn);
      });
    }

    async function newQuestion() {
      nextBtn.disabled       = true;
      choicesEl.innerHTML    = '';
      feedbackEl.textContent = '';
      sampleEl.className     = 'sample loading';
      sampleEl.textContent   = '···';
      sampleEl.style.fontSize = '1.6rem';

      if (prefetching) {
        await new Promise(resolve => {
          const t = setInterval(() => { if (!prefetching) { clearInterval(t); resolve(); } }, 50);
        });
      }

      if (prefetched) {
        const q = prefetched;
        prefetched = null;
        renderQuestion(q);
        prefetchNext();
        return;
      }

      try {
        const lang = randomLang();
        const distractors = pickDistractors(lang);
        const text = await fetchWikiText(lang);
        renderQuestion({ lang, distractors, text });
      } catch {
        sampleEl.className      = 'sample error';
        sampleEl.style.fontSize = '0.9rem';
        sampleEl.textContent    = 'Erreur de chargement — vérifie ta connexion';
        nextBtn.disabled = false;
      }

      prefetchNext();
    }

    function answer(clicked, chosen, correct) {
      choicesEl.querySelectorAll('.choice').forEach(b => b.disabled = true);

      if (chosen === correct) {
        clicked.classList.add('correct');
        feedbackEl.textContent = '✓ Correct !';
        feedbackEl.className   = 'feedback ok';
      } else {
        clicked.classList.add('wrong');
        feedbackEl.textContent = '✗ Incorrect !';
        feedbackEl.className   = 'feedback ko';
        choicesEl.querySelectorAll('.choice').forEach(b => {
          if (b.dataset.lang === correct) b.classList.add('reveal');
        });
        const correctLang = LANGUAGES.find(l => l.name === correct);
        if (correctLang?.tip) {
          tipEl.textContent   = correctLang.tip;
          tipEl.style.display = 'block';
        }
      }

      nextBtn.disabled = false;
    }

    nextBtn.addEventListener('click', newQuestion);

    fetch('languages.json')
      .then(r => r.json())
      .then(data => { LANGUAGES = data; newQuestion(); })
      .catch(() => {
        sampleEl.className      = 'sample error';
        sampleEl.style.fontSize = '0.9rem';
        sampleEl.textContent    = 'Impossible de charger languages.json';
      });
  </script>
</body>
</html>
